spring.application.name=ecommerce-backend

# Run on 8081 so Vue dev server (8080) can proxy /api to here
server.port=8081

# H2 file-based database (persists across restarts)
spring.datasource.url=jdbc:h2:file:./ecommercedb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 web console (available at http://localhost:8081/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Include reason in error responses (used by frontend error handling)
server.error.include-message=always
